<h2>Students</h2>

<app-confirm-modal
  [show]="showError"
  title="Logout"
  message="Are you sure! you want to logout"
  (cancel)="closeModal()"
  (confirm)="confirmModal()">
</app-confirm-modal>

<button (click)="addStudent()">Add Student</button>
<br> <br>
<table>
  <tr>
    <th>Roll No</th>
    <th>Student Name</th>
    <th>Class</th>
    <th>Parent Email</th>
    <th>Actions</th>
  </tr>

  <tr *ngFor="let s of students">
    <td>{{ s.rollNo }}</td>
    <td>{{ s.studentName }}</td>
    <td>{{ s.className }}</td>
    <td>{{ s.parentEmail }}</td>
    <td>
      <button (click)="editStudent(s.id!)">Edit</button>

      <button (click)="deleteStudent(s.id!)">Delete</button>
    </td>
  </tr>
</table>
