<h2>Fees Records</h2>

  <table>
    <tr>
    <th>Roll No</th>
    <th>StudentName</th>
    <th>ClassName</th>
    <th>Fees Pending</th>
    <th>Actions</th>
  </tr>

  <tr *ngFor="let fee of fees">
    <td>{{ fee.rollNo }}</td>
    <td>{{ fee.studentName }}</td>
    <td>{{ fee.className }}</td>
    <td>{{ fee.feesPending}}</td>
    <td>
      <button (click)="editFees(fee.id)">pay</button>
    </td>
  </tr>
</table>
